<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>足迹地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" id="brandButton" type="button" title="足迹地图">
          <span class="brand-mark">足</span>
          <span>
            <strong>足迹地图</strong>
          </span>
        </button>

        <div class="toolbar">
          <button class="icon-button music-button" id="musicButton" type="button" title="音乐开关">🎵</button>
          <div class="legend" id="legend">
            <button class="tool-button" id="filterToggleButton" type="button">筛选标签</button>
            <div class="filter-dropdown" id="filterDropdown" hidden></div>
          </div>
          <button class="tool-button" id="shareButton" type="button" hidden>分享</button>
          <button class="tool-button" id="posterButton" type="button">海报</button>
          <button class="tool-button" id="statsButton" type="button">统计</button>
          <button class="tool-button" id="ledgerButton" type="button" hidden>足迹簿</button>
          <span class="status-pill" id="authStatus" hidden>访客模式 (只读)</span>
          <button class="tool-button" id="loginButton" type="button" hidden>管理员登录</button>
          <button class="tool-button" id="logoutButton" type="button" hidden>退出</button>
        </div>
      </header>

      <main class="map-stage" style="padding: 0;">
        <div class="map-card" id="mapCard">
          <div id="yearOverlay" class="year-overlay" hidden></div>
          <div id="map"></div>
          <div class="map-loading" id="loadingMask">正在加载地图...</div>
          
          <div class="floating-panel floating-header">
            <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px;">
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <h1 id="mapTitle">全国足迹</h1>
                <div>
                  <button id="totalStatsBadge" class="stats-badge" type="button" title="点击查看详细统计" hidden>0 省份</button>
                </div>
              </div>
              <button class="tool-button" id="backButton" type="button" hidden>🔙 返回</button>
            </div>
            
            <div class="input-group time-control">
              <input type="number" id="yearInput" class="year-input" placeholder="截止年份">
              <button id="playButton" class="tool-button primary" type="button" title="播放演示">▶ 演示</button>
            </div>

            <div class="input-group search-group">
              <input id="locationSearchInput" type="search" placeholder="搜索具体地点..." autocomplete="off" />
              <button class="tool-button" id="clearSearchButton" type="button" hidden>清除</button>
            </div>

            <div class="search-results" id="searchResults" hidden></div>
            <div class="location-panel" id="locationPanel" hidden></div>
          </div>
          
          <div class="floating-panel floating-tools">
            <div class="segmented" aria-label="地图模式">
              <button type="button" data-map-mode="highlight" aria-pressed="true">足迹高亮</button>
              <button type="button" data-map-mode="plain" aria-pressed="false">普通地图</button>
            </div>
            <div class="segmented" id="fillLevelControls" aria-label="填色层级" hidden>
              <button type="button" data-fill-level="province" aria-pressed="true">省级填色</button>
              <button type="button" data-fill-level="city" aria-pressed="false">市级填色</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <aside class="drawer" id="ledgerDrawer" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <p class="eyebrow">全部记录</p>
          <h2>足迹簿</h2>
        </div>
        <button class="icon-button" id="closeLedgerButton" type="button" aria-label="关闭">×</button>
      </div>
      <div class="drawer-body" id="ledgerList"></div>
    </aside>

    <aside class="drawer" id="statsDrawer" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <p class="eyebrow">数据看板</p>
          <h2>我的旅行统计</h2>
        </div>
        <button class="icon-button" id="closeStatsButton" type="button" aria-label="关闭">×</button>
      </div>
      <div class="drawer-body">
        <div class="stats-summary" id="statsSummaryContainer">
          <!-- 动态渲染数字摘要 -->
        </div>
        <div class="chart-container">
          <h3 class="chart-title">足迹时间线</h3>
          <div id="timelineChart" style="width: 100%; height: 240px;"></div>
        </div>
        <div class="chart-container">
          <h3 class="chart-title">同行者分布</h3>
          <div id="companionChart" style="width: 100%; height: 240px;"></div>
        </div>
      </div>
    </aside>
    <div class="drawer-scrim" id="drawerScrim" hidden></div>

    <dialog class="modal" id="loginDialog">
      <form method="dialog" class="modal-panel" id="loginForm">
        <div class="modal-header">
          <div>
            <p class="eyebrow">管理员入口</p>
            <h2>登录后管理足迹</h2>
          </div>
          <button class="icon-button" value="cancel" type="button" data-close-login aria-label="关闭">×</button>
        </div>
        <label>
          邮箱
          <input id="emailInput" type="email" autocomplete="email" required />
        </label>
        <label>
          密码
          <input id="passwordInput" type="password" autocomplete="current-password" required />
        </label>
        <p class="form-message" id="loginMessage"></p>
        <div class="modal-actions">
          <button class="tool-button" value="cancel" type="button" data-close-login>取消</button>
          <button class="tool-button primary" type="submit">登录</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="footprintDialog">
      <form method="dialog" class="modal-panel" id="footprintForm">
        <div class="modal-header">
          <div>
            <p class="eyebrow" id="footprintDialogEyebrow">新增足迹</p>
            <h2 id="footprintDialogTitle">确认这次到访</h2>
          </div>
          <button class="icon-button" value="cancel" type="button" data-close-footprint aria-label="关闭">×</button>
        </div>

        <div class="locked-location" id="lockedLocation"></div>

        <label>
          行程年月
          <input id="visitMonthInput" type="month" required />
        </label>

        <label>
          同行者标签
          <select id="companionInput" required></select>
        </label>

        <label>
          备注
          <textarea id="remarkInput" rows="3" placeholder="写一句这次旅行的记忆"></textarea>
        </label>

        <p class="form-message" id="footprintMessage"></p>
        <div class="modal-actions">
          <button class="tool-button" value="cancel" type="button" data-close-footprint>取消</button>
          <button class="tool-button primary" type="submit">保存足迹</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="shareDialog">
      <form method="dialog" class="modal-panel" id="shareForm">
        <div class="modal-header">
          <div>
            <p class="eyebrow">生成分享链接</p>
            <h2>与朋友分享足迹</h2>
          </div>
          <button class="icon-button" value="cancel" type="button" data-close-share aria-label="关闭">×</button>
        </div>

        <label>
          有效期
          <select id="shareExpireInput">
            <option value="7">7天后失效</option>
            <option value="30">30天后失效</option>
            <option value="1">1天后失效</option>
            <option value="0">永久有效</option>
          </select>
        </label>

        <label>
          备注标签 (可选)
          <input id="shareLabelInput" type="text" placeholder="例如：发给小明" maxlength="50" />
        </label>

        <div class="share-tags-section">
          <label>允许对方查看的足迹标签 (默认全选)</label>
          <div id="shareTagsContainer" class="share-tags-grid"></div>
        </div>

        <p class="form-message" id="shareMessage"></p>
        
        <div id="shareResultArea" hidden>
          <label>分享链接</label>
          <div style="display: flex; gap: 8px;">
            <input id="shareLinkInput" type="text" readonly style="flex: 1;" />
            <button class="tool-button primary" id="copyShareButton" type="button">复制</button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="tool-button" value="cancel" type="button" data-close-share>关闭</button>
          <button class="tool-button primary" id="generateShareButton" type="submit">生成链接</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="posterDialog">
      <form method="dialog" class="modal-panel" id="posterForm" style="width: auto; max-width: 90vw;">
        <div class="modal-header">
          <div>
            <p class="eyebrow">生成结果</p>
            <h2>您的足迹海报</h2>
          </div>
          <button class="icon-button" value="cancel" type="button" data-close-poster aria-label="关闭">×</button>
        </div>
        <div style="text-align: center; margin: 16px 0;">
          <img id="posterPreviewImage" src="" alt="海报预览" style="max-height: 60vh; max-width: 100%; border-radius: 8px; box-shadow: var(--shadow);" />
        </div>
        <div class="modal-actions" style="justify-content: center;">
          <a id="posterDownloadLink" class="tool-button primary" href="#" download="footprint-poster.png" style="text-decoration: none; padding: 10px 32px; font-weight: 600;">保存到相册 / 下载</a>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>

    <div id="offscreenMap" style="width: 4096px; height: 2048px; position: absolute; left: -9999px; top: -9999px;" aria-hidden="true"></div>

    <audio id="bgMusic" src="./music.flac" loop preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
